<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sites Directory</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <main class="mx-auto max-w-4xl px-6 py-12">
    <header class="mb-10">
      <h1 class="text-3xl font-bold tracking-tight sm:text-4xl">Hosted Demo Pages</h1>
      <p class="mt-3 text-slate-300">Automatically generated list of all HTML pages in this repository.</p>
    </header>

    <section class="rounded-2xl border border-slate-800 bg-slate-900/60 shadow-xl">
      <div class="border-b border-slate-800 px-6 py-4">
        <h2 class="text-lg font-semibold">Website Sitemap</h2>
      </div>
      <div id="status" class="px-6 py-4 text-slate-300">Loading pages…</div>
      <ul id="site-list" class="divide-y divide-slate-800"></ul>
    </section>
  </main>

  <script>
    (() => {
      const owner = "Falcon-98";
      const repo = "Sites";
      const branch = "main";
      const statusEl = document.getElementById("status");
      const listEl = document.getElementById("site-list");

      const treeApi = `https://api.github.com/repos/${owner}/${repo}/git/trees/${branch}?recursive=1`;
      const pagesBase = `https://${owner.toLowerCase()}.github.io/${repo}`;

      const formatName = (path) =>
        path
          .replace(/\.html$/i, "")
          .split("/")
          .pop()
          .replace(/[-_]+/g, " ")
          .replace(/\b\w/g, (m) => m.toUpperCase());

      const toUrl = (path) =>
        `${pagesBase}/${path
          .split("/")
          .map((segment) => encodeURIComponent(segment))
          .join("/")}`;

      const renderList = (paths) => {
        listEl.innerHTML = "";
        if (!paths.length) {
          statusEl.textContent = "No other HTML pages found.";
          return;
        }

        statusEl.textContent = `Found ${paths.length} page${paths.length > 1 ? "s" : ""}.`;
        paths.forEach((path) => {
          const li = document.createElement("li");
          li.className = "px-6 py-4";

          const name = formatName(path);
          const url = toUrl(path);

          li.innerHTML = `
            <a class="group block rounded-lg p-3 transition hover:bg-slate-800/70 focus:outline-none focus-visible:ring-2 focus-visible:ring-sky-400" href="${url}" target="_blank" rel="noopener noreferrer">
              <p class="text-base font-medium text-slate-100 group-hover:text-sky-300">${name}</p>
              <p class="mt-1 break-all text-sm text-slate-400 group-hover:text-slate-300">${url}</p>
            </a>
          `;
          listEl.appendChild(li);
        });
      };

      const loadPages = async () => {
        try {
          const res = await fetch(treeApi, { headers: { Accept: "application/vnd.github+json" } });
          if (!res.ok) {
            throw new Error(`GitHub API request failed: ${res.status}`);
          }

          const data = await res.json();
          const paths = (data.tree || [])
            .filter((entry) => entry.type === "blob")
            .map((entry) => entry.path)
            .filter((path) => /\.html$/i.test(path))
            .filter((path) => path.toLowerCase() !== "index.html")
            .sort((a, b) => a.localeCompare(b));

          renderList(paths);
        } catch (err) {
          statusEl.textContent = "Could not load page list automatically.";
          const hint = document.createElement("p");
          hint.className = "mt-2 text-sm text-rose-300";
          hint.textContent = "Please check repository visibility, branch name, or API rate limits.";
          statusEl.appendChild(hint);
        }
      };

      loadPages();
    })();
  </script>
</body>
</html>
